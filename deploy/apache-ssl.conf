<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName {{DOMAIN}}
        DocumentRoot {{PROJECT_PATH}}/public

        <Directory {{PROJECT_PATH}}/public>
            Options -Indexes +FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>

        ErrorLog ${APACHE_LOG_DIR}/ucc-chat-ssl-error.log
        CustomLog ${APACHE_LOG_DIR}/ucc-chat-ssl-access.log combined

        SSLEngine on
        SSLCertificateFile      /etc/ssl/certs/{{DOMAIN}}.pem
        SSLCertificateKeyFile   /etc/ssl/private/{{DOMAIN}}.key

        # Security headers
        # HSTS (Strict-Transport-Security): Enforces HTTPS connection.
        Header always set Strict-Transport-Security "max-age=63072000"
        # X-Frame-Options: Prevents Clickjacking attacks by disallowing framing.
        Header always set X-Frame-Options "SAMEORIGIN"
        # X-Content-Type-Options: Prevents MIME-sniffing attacks.
        Header always set X-Content-Type-Options "nosniff"
        # Referrer-Policy: Controls how much referrer information is sent.
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        # X-XSS-Protection: Activates browser's built-in XSS auditing.
        Header always set X-XSS-Protection "1; mode=block"

        # Content-Security-Policy: Mitigates XSS by whitelisting resource sources.
        # Allows content from self, and WebSockets from the same domain.
        # 'unsafe-inline' for styles is often needed for JS frameworks but should be as strict as possible.
        Header always set Content-Security-Policy "default-src 'self'; \
            script-src 'self'; \
            style-src 'self' 'unsafe-inline'; \
            img-src 'self' data:; \
            font-src 'self'; \
            connect-src 'self' wss://{{DOMAIN}}; \
            frame-ancestors 'self'; \
            form-action 'self'; \
            object-src 'none'"

        # ServerSignature Off: Hides Apache version information to prevent recon.
        ServerSignature Off
    </VirtualHost>
</IfModule>
